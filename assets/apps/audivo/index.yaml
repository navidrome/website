name: Audivo

description: >
  Audivo is a modern native iOS client for Navidrome and OpenSubsonic,
  designed to feel at home on iOS. It combines a polished interface with
  powerful features including CarPlay, offline playback, podcasts, and
  continuous updates focused on delivering the best possible listening
  experience. Currently available via TestFlight.

