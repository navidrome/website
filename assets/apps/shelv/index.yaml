api: Subsonic
description: "Shelv is a native SwiftUI music client for Navidrome and Subsonic-compatible servers. Browse albums, artists, playlists, favorites, lyrics and radio in a clean Apple-style interface for iPhone, iPad, Mac and Apple TV. Offline downloads, smart caching, queue tools and optional iCloud sync keep your music flowing everywhere."
