name: Substreamer
url: https://substreamer.org/
repoUrl: https://github.com/ghenry22/substreamer
isFree: true
platforms:
  android:
    store: https://play.google.com/store/apps/details?id=com.ghenry22.substream2
  ios:
    store: https://apps.apple.com/us/app/substreamer/id1012991665
api: OpenSubsonic
description: "A free, open-source music streaming client for iOS and Android. Features offline downloads, 5-star ratings, scrobbling, listening analytics, playlist management, and configurable playback speed."
keywords:
  - offline
  - scrobble
  - analytics
  - ratings
  - favorites
  - smart mixes
screenshots:
  thumbnail: home.webp
  gallery:
    - library.webp
    - player.webp
    - album_detail.webp
