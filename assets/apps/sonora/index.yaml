description: "Sonora is a sleek and lightweight iOS client for Navidrome. Designed to bring a modern, native experience to your personal music collection. Sonora offers offline listening, full CarPlay support, and a beautiful interface that makes it easy to enjoy your music on the go. With Sonora, you can seamlessly sync your music library, create playlists, and listen to your favorite tracks without any hassle. Whether you're at home or on the road, Sonora is the perfect companion for your Navidrome server."
