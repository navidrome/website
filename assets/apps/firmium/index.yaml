description: "Modern. Fast. Simple. Thats what Firmium is. Built with Tauri, and Svelte this app is lightweight, easy to work with, and pretty. Bulit with a security-first mindset - your passwords, tokens, keys, are all saved to your systems keyring. It features - synced lyrics with LrcLIB - gapless playback and crossfade - 10+ color themes, plus more to come."

