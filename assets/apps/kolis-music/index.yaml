description: "Connect to your private library and enjoy your music on the go with Kolis-Music, a sleek and user-friendly Subsonic client for iOS and macOS. With features like gapless playback, automatic caching, offline mode, synced lyrics, CarPlay support, and seeking in transcoded files, Kolis-Music offers a seamless listening experience for music lovers."
