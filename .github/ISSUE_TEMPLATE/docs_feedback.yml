name: Documentation Feedback
description: Suggest improvements to the Navidrome documentation.
title: "[Docs Feedback]: "
labels: ["documentation", "enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        > **Important:** This repository is for the Navidrome **documentation website** only.
        >
        > If you want to report a bug or request a feature for the **Navidrome server**, please go to
        > **[navidrome/navidrome](https://github.com/navidrome/navidrome/issues/new/choose)** instead.
  - type: checkboxes
    id: confirm-docs
    attributes:
      label: "I confirm that:"
      options:
        - label: This issue is about the **documentation website**, NOT about the Navidrome server
          required: true
  - type: input
    id: page-url
    attributes:
      label: Page URL or path
      description: Which documentation page is this about?
      placeholder: "https://www.navidrome.org/docs/..."
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggestion
      description: How could this documentation be improved?
    validations:
      required: true
